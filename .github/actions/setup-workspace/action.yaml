---
name: "Setup Go Workspace"
description: "Configure workspace development environment."

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.25"

    - name: Install Just
      uses: extractions/setup-just@v3

    - name: Tidy modules
      shell: bash
      run: |
        go mod tidy
